# local build using dockerfiles
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      ENABLE_REQUEST_LOGS: "false"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      DEVICE_PROPERTIES_ENCRYPTION_KEY: ${DEVICE_PROPERTIES_ENCRYPTION_KEY:-change-me}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # persist SQLite data dir outside the container; use directory-to-directory mount for portability
      - ${DB_PATH_HOST:-./data}:/app/backend/data
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "127.0.0.1:5173:5173"
    restart: unless-stopped
